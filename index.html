<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherIQ — Smart City Weather</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body id="app-body">

    <!-- Atmospheric Background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="noise-overlay"></div>
    <div id="weather-fx" class="weather-fx"></div>

    <div class="app-container">

        <!-- Header -->
        <header class="header">
            <div class="header-top">
                <div class="brand">
                    <span class="brand-icon"><i class="fa-solid fa-wind"></i></span>
                    <span class="brand-name">WeatherIQ</span>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                    <i class="fa-solid fa-sun" id="theme-icon"></i>
                </button>
            </div>

            <!-- Search -->
            <form id="search-form" class="search-form" autocomplete="off">
                <div class="search-inner">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input 
                        type="text" 
                        id="city-input" 
                        placeholder="Search any city..."
                        required
                    >
                    <button type="submit" class="search-btn">
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </form>
            
            <!-- Recent Searches -->
            <div id="recent-searches" class="recent-searches">
                <!-- Injected by JS -->
            </div>
            <!-- Messages -->
            <div id="error-message" class="error-banner hidden">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="error-text">City not found.</span>
            </div>
        </header>

        <!-- Loading -->
        <div id="loading" class="loading-state hidden">
            <div class="pulse-ring"></div>
            <div class="pulse-ring delay-1"></div>
            <div class="pulse-ring delay-2"></div>
            <span class="loading-text">Fetching atmosphere...</span>
        </div>

        <!-- Main Weather Content -->
        <main id="weather-content" class="weather-content hidden">

            <!-- Hero Row: Big Temp + Location -->
            <section class="hero-section">
                <div class="hero-left">
                    <div class="location-badge">
                        <i class="fa-solid fa-location-dot"></i>
                        <span id="city-display">--</span>
                        <span class="separator">·</span>
                        <span id="country-display">--</span>
                    </div>
                    <div class="hero-temp-row">
                        <span id="current-temp" class="big-temp">--°</span>
                        <div class="hero-icon-wrap">
                            <img id="current-icon" src="" alt="Weather" class="hero-icon">
                        </div>
                    </div>
                    <p id="current-condition" class="condition-label">--</p>
                </div>

                <!-- Right: Stats Pills -->
                <div class="stats-column">
                    <div class="stat-pill">
                        <div class="stat-icon humidity-icon">
                            <i class="fa-solid fa-droplet"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-label">Humidity</span>
                            <span class="stat-value" id="current-humidity">--%</span>
                        </div>
                    </div>
                    <div class="stat-pill">
                        <div class="stat-icon wind-icon">
                            <i class="fa-solid fa-wind"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-label">Wind</span>
                            <span class="stat-value" id="current-wind">-- m/s</span>
                        </div>
                    </div>
                    <div class="stat-pill">
                        <div class="stat-icon feels-icon">
                            <i class="fa-solid fa-temperature-half"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-label">Feels Like</span>
                            <span class="stat-value" id="feels-like">--°</span>
                        </div>
                    </div>
                    <div class="stat-pill">
                        <div class="stat-icon visibility-icon">
                            <i class="fa-solid fa-eye"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-label">Visibility</span>
                            <span class="stat-value" id="visibility">-- km</span>
                        </div>
                    </div>
                    <div class="stat-pill">
                        <div class="stat-icon aqi-icon">
                            <i class="fa-solid fa-leaf"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-label">AQI</span>
                            <span class="stat-value" id="current-aqi">--</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Middle Row: Advice + AQI-style extras -->
            <section class="mid-section">

                <!-- Smart Recommendations -->
                <div class="glass-card advice-card">
                    <div class="card-header">
                        <span class="card-label">Smart Recommendations</span>
                        <span class="card-tag">AI</span>
                    </div>
                    <div id="advice-container" class="advice-list">
                        <!-- Injected by JS -->
                    </div>
                </div>

                <!-- Sun Times Card -->
                <div class="glass-card sun-card">
                    <div class="card-header">
                        <span class="card-label">Sun Schedule</span>
                    </div>
                    <div class="sun-arc-wrap">
                        <svg class="sun-arc" viewBox="0 0 200 110" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 100 Q100 0 190 100" stroke="rgba(255,255,255,0.12)" stroke-width="2" fill="none"/>
                            <path id="sun-progress-path" d="M10 100 Q100 0 190 100" stroke="url(#sunGrad)" stroke-width="2.5" fill="none" 
                                  stroke-dasharray="300" stroke-dashoffset="300"/>
                            <defs>
                                <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#f97316"/>
                                    <stop offset="100%" stop-color="#fbbf24"/>
                                </linearGradient>
                            </defs>
                            <circle id="sun-dot" cx="10" cy="100" r="5" fill="#fbbf24" filter="url(#glow)"/>
                            <defs>
                                <filter id="glow">
                                    <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                                    <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
                                </filter>
                            </defs>
                        </svg>
                    </div>
                    <div class="sun-times">
                        <div class="sun-time-item">
                            <i class="fa-solid fa-sun sunrise-clr"></i>
                            <span class="sun-time-lbl">Sunrise</span>
                            <span class="sun-time-val" id="sunrise-time">--:--</span>
                        </div>
                        <div class="sun-time-item">
                            <i class="fa-solid fa-moon sunset-clr"></i>
                            <span class="sun-time-lbl">Sunset</span>
                            <span class="sun-time-val" id="sunset-time">--:--</span>
                        </div>
                    </div>
                </div>

            </section>

            <!-- Forecast Strip -->
            <section class="forecast-section">
                <div class="section-title">
                    <i class="fa-regular fa-calendar-days"></i>
                    <span>5-Day Forecast</span>
                </div>
                <div id="forecast-container" class="forecast-strip">
                    <!-- Injected by JS -->
                </div>
            </section>

        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
