<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City Weather Dashboard</title>
    <!-- Tailwind CSS for robust styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body id="app-body" class="min-h-screen font-outfit text-white bg-gradient-to-br from-[#f97316] to-[#ea580c] flex flex-col items-center py-10 px-4 md:px-8">

    <div class="w-full max-w-5xl">
        <!-- Header Section -->
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold mb-6 drop-shadow-lg tracking-tight">
                <i class="fa-solid fa-cloud-sun text-white mr-3"></i>Smart City Weather
            </h1>
            
            <!-- Search Bar -->
            <form id="search-form" class="relative max-w-lg mx-auto transform transition-transform focus-within:scale-105">
                <input 
                    type="text" 
                    id="city-input" 
                    placeholder="Search for a city..." 
                    class="w-full py-4 px-6 rounded-full text-gray-800 bg-white shadow-xl focus:outline-none focus:ring-4 focus:ring-white/50 text-lg transition-all"
                    autocomplete="off"
                    required
                >
                <button type="submit" class="absolute right-2 top-2 bottom-2 bg-[#3b82f6] hover:bg-blue-600 text-white rounded-full px-6 flex items-center justify-center transition-all shadow-md">
                    <i class="fa-solid fa-search"></i>
                </button>
            </form>
            
            <!-- Messages container -->
            <div id="error-message" class="text-red-200 mt-4 font-semibold hidden bg-red-900/40 py-2 px-4 rounded-lg inline-block backdrop-blur-sm border border-red-500/30">
                <i class="fa-solid fa-circle-exclamation mr-2"></i><span id="error-text">City not found. Please try again.</span>
            </div>
            
            <div id="loading" class="mt-6 hidden flex flex-col items-center justify-center text-white/90">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-2 drop-shadow-md"></i>
                <span class="font-medium tracking-wider">Fetching real-time data...</span>
            </div>
        </header>

        <!-- Main Content (Hidden Initially) -->
        <main id="weather-content" class="hidden flex flex-col gap-8 opacity-0 transition-opacity duration-700 ease-in-out">
            
            <!-- Top Section: Current Weather & Advice -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                
                <!-- Current Weather Card -->
                <div class="bg-white text-[#1e293b] rounded-[2rem] p-8 shadow-2xl relative overflow-hidden group">
                    
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-3xl md:text-4xl font-bold drop-shadow-md flex flex-col" id="city-name">
                                <span id="city-display" class="mb-1">--</span>
                                <span id="country-display" class="text-lg font-normal text-[#64748b]"><i class="fa-solid fa-location-dot mr-1 text-[#f97316]"></i>--</span>
                            </h2>
                        </div>
                        <img id="current-icon" src="" alt="Weather Icon" class="w-24 h-24 drop-shadow-[0_10px_10px_rgba(0,0,0,0.3)] filter hover:scale-110 transition-transform">
                    </div>
                    
                    <div class="flex items-end gap-4 mb-4">
                        <div class="text-7xl md:text-8xl font-bold drop-shadow-lg tracking-tighter" id="current-temp">--°</div>
                        <div class="text-2xl md:text-3xl font-medium mb-2 capitalize text-[#64748b]" id="current-condition">--</div>
                    </div>
                    
                    <!-- Stats Grid -->
                    <div class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-gray-100">
                        <div class="flex items-center gap-4 bg-slate-50 rounded-2xl p-4 transition-colors">
                            <i class="fa-solid fa-droplet text-2xl text-[#3b82f6]"></i>
                            <div>
                                <div class="text-sm font-medium text-[#64748b] uppercase tracking-widest">Humidity</div>
                                <div class="font-bold text-xl text-[#1e293b]" id="current-humidity">--%</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 bg-slate-50 rounded-2xl p-4 transition-colors">
                            <i class="fa-solid fa-wind text-2xl text-[#3b82f6]"></i>
                            <div>
                                <div class="text-sm font-medium text-[#64748b] uppercase tracking-widest">Wind</div>
                                <div class="font-bold text-xl text-[#1e293b]" id="current-wind">-- m/s</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- AI Advice Card (What to wear) -->
                <div class="bg-white text-[#1e293b] rounded-[2rem] p-8 shadow-2xl flex flex-col justify-between relative overflow-hidden group">
                    
                    <div>
                        <h3 class="text-2xl font-bold mb-6 flex items-center gap-3">
                            <div class="bg-orange-100 text-[#f97316] p-2 rounded-xl"><i class="fa-solid fa-shirt"></i></div>
                            Smart Recommendations
                        </h3>
                        
                        <!-- Dynamic Suggestions -->
                        <div id="advice-container" class="space-y-4">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                    
                    <div class="mt-6 text-sm text-[#64748b] text-right italic font-medium">
                        Powered by real-time climate data
                    </div>
                </div>
            </div>

            <!-- Bottom Section: 5-Day Forecast -->
            <section class="mt-4">
                <h3 class="text-2xl font-bold mb-6 flex items-center gap-3 drop-shadow-md">
                    <i class="fa-regular fa-calendar-days opacity-80"></i> 5-Day Forecast
                </h3>
                
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4 md:gap-6" id="forecast-container">
                    <!-- Forecast Cards Injected by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Script loading -->
    <script src="script.js"></script>
</body>
</html>
